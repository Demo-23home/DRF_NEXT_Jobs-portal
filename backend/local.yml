version: "3.9"

services:
  api: &api
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    image: jobbee_api
    container_name: jobbee_api
    volumes:
      - .:/app:z
      - ./staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - ./.envs/.env.local
    depends_on:
      - postgres
    command: /start
    tty: true
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - jobbee_nw

  postgres:
    image: postgis/postgis:18-3.6
    container_name: jobbee_postgres
    ports:
      - "5435:5432"
    volumes:
      - jobbee_postgres_data:/var/lib/postgresql
    env_file:
      - ./.envs/.env.local
    networks:
      - jobbee_nw

networks:
  jobbee_nw:
    external: true

volumes:
  jobbee_postgres_data:
