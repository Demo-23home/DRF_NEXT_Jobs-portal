version: "3.9"

services:
  api: &api
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    image: jobbee_api
    container_name: jobbee_api
    volumes:
      - .:/app:z
      - ./staticfiles:/app/staticfiles

    expose:
      - "8000"
    env_file:
      - ./.envs/.env.local
    depends_on:
      - postgres
    command: /start
    tty: true
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - jobbee_pr_nw

  postgres:
    build:
      context: .
      dockerfile: ./docker/local/postgres/Dockerfile
    image: jobbee_postgres
    container_name: jobbee_postgres
    ports:
      - "5435:5432"
    volumes:
      - jobbee_prod_postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.envs/.env.local
    networks:
      - jobbee_pr_nw

# =========================
# Networks
# =========================
networks:
  jobbee_pr_nw:
    external: true

# =========================
# Volumes
# =========================
volumes:
  jobbee_prod_postgres_data:
